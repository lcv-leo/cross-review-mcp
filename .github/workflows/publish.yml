name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to publish (e.g. v1.0.2). Defaults to current ref.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  gate:
    name: Pre-publish gate (smoke + drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Smoke tests
        run: npm run smoke

      - name: Model drift audit
        run: npm run check-models

  publish-npmjs:
    name: Publish to npmjs.com
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@lcv-ideas-software'
          cache: npm

      - name: Normalize package metadata to canonical scope
        # Historical commits (v1.0.2 - v1.2.13) shipped under the deprecated
        # @lcv-leo npm scope. After the org transfer to LCV-Ideas-Software
        # (v1.2.14), the @lcv-leo packages were unpublished. Republishing
        # those historical tags to npmjs.com requires rewriting the package
        # name + repository.url to the canonical @lcv-ideas-software scope
        # AT BUILD TIME — git history is immutable, so we patch the working
        # copy before npm reads it. Newer commits (v1.2.14+) already have
        # the canonical metadata; this step is a no-op for them.
        run: |
          set -euo pipefail
          node <<'JS'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const CANONICAL_NAME = '@lcv-ideas-software/cross-review-v1';
          const CANONICAL_REPO = 'https://github.com/LCV-Ideas-Software/cross-review-v1';
          let mutated = false;
          if (pkg.name !== CANONICAL_NAME) {
            console.log(`Renaming package: ${pkg.name} -> ${CANONICAL_NAME}`);
            pkg.name = CANONICAL_NAME;
            mutated = true;
          }
          if (pkg.repository && typeof pkg.repository === 'object') {
            const want = `git+${CANONICAL_REPO}.git`;
            if (pkg.repository.url !== want) {
              console.log(`Updating repository.url: ${pkg.repository.url} -> ${want}`);
              pkg.repository.url = want;
              mutated = true;
            }
          }
          if (pkg.homepage && pkg.homepage.includes('lcv-leo')) {
            const newHome = pkg.homepage.replace(/lcv-leo/g, 'LCV-Ideas-Software');
            console.log(`Updating homepage: ${pkg.homepage} -> ${newHome}`);
            pkg.homepage = newHome;
            mutated = true;
          }
          if (pkg.bugs && pkg.bugs.url && pkg.bugs.url.includes('lcv-leo')) {
            const newBugs = pkg.bugs.url.replace(/lcv-leo/g, 'LCV-Ideas-Software');
            console.log(`Updating bugs.url: ${pkg.bugs.url} -> ${newBugs}`);
            pkg.bugs.url = newBugs;
            mutated = true;
          }
          if (mutated) {
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json normalized for canonical org scope.');
          } else {
            console.log('package.json already canonical, no changes.');
          }
          JS

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check npmjs.com package version
        id: npmjs-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already exists on npmjs.com; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is not published on npmjs.com yet."
          fi

      - name: Publish (public, with provenance)
        if: steps.npmjs-version.outputs.exists != 'true'
        run: npm publish --access public --provenance

  publish-gh-packages:
    name: Publish to GitHub Packages
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lcv-ideas-software'
          cache: npm

      - name: Normalize package metadata to canonical scope
        run: |
          set -euo pipefail
          node <<'JS'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const CANONICAL_NAME = '@lcv-ideas-software/cross-review-v1';
          const CANONICAL_REPO = 'https://github.com/LCV-Ideas-Software/cross-review-v1';
          let mutated = false;
          if (pkg.name !== CANONICAL_NAME) {
            pkg.name = CANONICAL_NAME;
            mutated = true;
          }
          if (pkg.repository && typeof pkg.repository === 'object') {
            const want = `git+${CANONICAL_REPO}.git`;
            if (pkg.repository.url !== want) {
              pkg.repository.url = want;
              mutated = true;
            }
          }
          if (pkg.homepage && pkg.homepage.includes('lcv-leo')) {
            pkg.homepage = pkg.homepage.replace(/lcv-leo/g, 'LCV-Ideas-Software');
            mutated = true;
          }
          if (pkg.bugs && pkg.bugs.url && pkg.bugs.url.includes('lcv-leo')) {
            pkg.bugs.url = pkg.bugs.url.replace(/lcv-leo/g, 'LCV-Ideas-Software');
            mutated = true;
          }
          if (mutated) {
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json normalized for canonical org scope.');
          } else {
            console.log('package.json already canonical, no changes.');
          }
          JS

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check GitHub Packages version
        id: gh-packages-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already exists on GitHub Packages; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is not published on GitHub Packages yet."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish (public, with provenance)
        if: steps.gh-packages-version.outputs.exists != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-github-release:
    # Auto-create a GitHub Release on tag push so we never have to do it
    # manually again. CHANGELOG.md is the source of truth for the release
    # notes — this step extracts the section for the current tag and uses
    # it as the body. Idempotent: if a release already exists for the tag,
    # the step exits cleanly without recreating.
    name: Create GitHub Release
    needs: [publish-npmjs, publish-gh-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Strip leading 'v' for the CHANGELOG header match (CHANGELOG uses
          # [1.0.5], code uses v1.0.5).
          VERSION="${TAG#v}"
          # awk extracts the section between [VERSION] and the next ## header.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG. See CHANGELOG.md for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release (idempotent)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest
