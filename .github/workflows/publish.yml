name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to publish (e.g. v1.0.2). Defaults to current ref.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  gate:
    name: Pre-publish gate (smoke + drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Smoke tests
        run: npm run smoke

      - name: Model drift audit
        run: npm run check-models

  publish-npmjs:
    name: Publish to npmjs.com
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@lcv-leo'
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish (public, with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gh-packages:
    name: Publish to GitHub Packages
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lcv-leo'
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish (public, with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
