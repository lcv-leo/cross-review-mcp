name: Auto-tag on version bump

# Universal tag convention (operator directive 2026-04-28): vXX.XX.XX with
# two-digit zero-padded segments. package.json keeps semver shape (npm
# requires it) — the tag is derived with zero-pad transform.
#
# Idempotent on transition: checks BOTH the new universal format and the
# legacy unpadded format for the current version. If either exists on
# origin, the workflow exits without creating anything. This prevents a
# duplicate release when the repo's history has tags from before the
# universal convention was adopted.
#
# Triggered by push to main + workflow_dispatch. GitHub does not start a
# second workflow from a tag push created with GITHUB_TOKEN, so this workflow
# explicitly dispatches publish.yml on the freshly-created tag ref. The
# npm-production environment allows v* tag refs, not main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-tag:
    name: Create universal-format tag if package.json was bumped
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Read package.json version + compute tags
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$ ]]; then
            echo "::error::Invalid version shape in package.json: '$VERSION'. Expected X.Y.Z or X.Y.Z-prerelease."
            exit 1
          fi
          # Universal format: vXX.XX.XX with zero-pad. Strips any pre-release suffix from the tag.
          BASE=$(echo "$VERSION" | sed -E 's/-.*$//')
          PAD=$(echo "$BASE" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')
          # Legacy format: v${VERSION} (unpadded; what cross-review-v1 shipped before 2026-04-28).
          LEGACY="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$PAD" >> "$GITHUB_OUTPUT"
          echo "legacy_tag=$LEGACY" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION → universal tag: $PAD, legacy tag: $LEGACY"

      - name: Check if either tag already exists on origin
        id: check
        env:
          TAG: ${{ steps.version.outputs.tag }}
          LEGACY_TAG: ${{ steps.version.outputs.legacy_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "publish_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists; skipping."
          elif git ls-remote --exit-code --tags origin "refs/tags/${LEGACY_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "publish_tag=${LEGACY_TAG}" >> "$GITHUB_OUTPUT"
            echo "Legacy tag ${LEGACY_TAG} already exists for this version; skipping (transition guard)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "publish_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Neither ${TAG} nor ${LEGACY_TAG} exists; will create universal-format tag ${TAG}."
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Keep automated release tags lightweight so refs/tags/<tag> points
          # directly to the release commit. Annotated tags create a second
          # tag-object SHA, which makes post-release verification noisier.
          git tag "${TAG}" HEAD
          git push origin "${TAG}"
          echo "Created and pushed lightweight tag ${TAG}; publish.yml will be dispatched on the tag ref."

      - name: Dispatch publish workflow on tag ref
        if: steps.check.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.check.outputs.publish_tag }}
        run: |
          set -euo pipefail
          # Use the tag ref so the npm-production environment branch policy
          # (v* tags only) accepts the trusted-publishing deployment.
          expected_sha="$(git rev-parse HEAD)"
          for attempt in {1..10}; do
            tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}')"
            peeled_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk '{print $1}')"
            if [ -n "${tag_sha}" ]; then
              if [ "${tag_sha}" = "${expected_sha}" ]; then
                echo "Tag ${TAG} is visible on origin as a lightweight tag at ${expected_sha}."
                break
              fi
              if [ "${peeled_sha}" = "${expected_sha}" ]; then
                echo "::warning::Tag ${TAG} is annotated but peels to ${expected_sha}; proceeding for compatibility. New auto-created tags are lightweight."
                break
              fi
              echo "::error::Tag ${TAG} points to ${tag_sha} (peeled: ${peeled_sha:-none}), expected ${expected_sha}; refusing to dispatch publish.yml."
              exit 1
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "::error::Tag ${TAG} was not visible on origin after push; refusing to dispatch publish.yml."
              exit 1
            fi
            echo "Waiting for tag ${TAG} to become visible on origin (${attempt}/10)."
            sleep 2
          done
          gh workflow run publish.yml --ref "${TAG}" -f tag="${TAG}"
          echo "Dispatched publish.yml for ${TAG}."
